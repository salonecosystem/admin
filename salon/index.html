<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Salon AI - Owner Pro Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .app-container { max-width: 450px; margin: 0 auto; min-height: 100vh; background: #020617; position: relative; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
        .gradient-blue { background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%); }
        .gradient-emerald { background: linear-gradient(135deg, #10b981 0%, #047857 100%); }
        .gradient-violet { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); }
        .gradient-amber { background: linear-gradient(135deg, #f59e0b 0%, #b45309 100%); }
        .gradient-red { background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%); }
        input, select, textarea { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6 !important; box-shadow: 0 0 0 3px rgba(59,130,246,0.15) !important; }
        input::placeholder, textarea::placeholder { color: #475569 !important; }
        select option { background: #0f172a; color: white; }
        .nav-active { color: #60a5fa !important; filter: drop-shadow(0 0 8px rgba(96, 165, 250, 0.5)); }
        .hidden { display: none !important; }
        /* Toggle Switch */
        .toggle-wrap { position: relative; display: inline-block; width: 56px; height: 28px; }
        .toggle-wrap input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; inset: 0; background: rgba(255,255,255,0.1); border-radius: 28px; cursor: pointer; transition: 0.3s; }
        .toggle-slider:before { content: ''; position: absolute; width: 22px; height: 22px; left: 3px; bottom: 3px; background: #64748b; border-radius: 50%; transition: 0.3s; }
        input:checked + .toggle-slider { background: linear-gradient(135deg, #10b981, #047857); }
        input:checked + .toggle-slider:before { transform: translateX(28px); background: white; }
        /* Status pills */
        .pill { padding: 3px 10px; border-radius: 20px; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; }
        .pill-green { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
        .pill-amber { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
        .pill-red { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
        .pill-blue { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
        /* Modal */
        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
        .modal-box { background: #0f172a; border-radius: 2rem 2rem 0 0; padding: 1.8rem; width: 100%; max-width: 450px; border-top: 1px solid rgba(255,255,255,0.1); max-height: 88vh; overflow-y: auto; }
        /* Booking card */
        .booking-card { background: rgba(30,41,59,0.5); border: 1px solid rgba(255,255,255,0.07); border-radius: 1.5rem; padding: 1rem 1.2rem; margin-bottom: 12px; }
        /* Slot grid */
        .slot-cell { border-radius: 10px; padding: 6px 4px; font-size: 9px; font-weight: 700; text-align: center; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .slot-free { background: rgba(16,185,129,0.12); color: #34d399; border-color: rgba(16,185,129,0.25); }
        .slot-blocked { background: rgba(239,68,68,0.12); color: #f87171; border-color: rgba(239,68,68,0.25); }
        .slot-booked { background: rgba(59,130,246,0.12); color: #60a5fa; border-color: rgba(59,130,246,0.25); cursor: default; }
        /* Day pill */
        .day-pill { padding: 8px 14px; border-radius: 20px; font-size: 10px; font-weight: 900; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: #64748b; transition: all 0.2s; }
        .day-pill.on { border-color: #3b82f6; background: rgba(59,130,246,0.15); color: #60a5fa; }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        /* Star rating */
        .star { color: #334155; font-size: 20px; cursor: pointer; transition: color 0.15s; }
        .star.lit { color: #fbbf24; }
        /* Notification dot */
        .notif-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; position: absolute; top: -2px; right: -2px; border: 2px solid #020617; }
    </style>
</head>
<body>
<div id="app" class="app-container">

    <!-- ══════════════════════════════════════
         LOGIN SCREEN
    ══════════════════════════════════════ -->
    <div id="login-screen" class="p-8 pt-24">
        <div class="w-20 h-20 gradient-blue rounded-3xl flex items-center justify-center mb-10 rotate-3 shadow-2xl shadow-blue-500/30">
            <i class="fa-solid fa-shop text-white text-4xl"></i>
        </div>
        <h1 class="text-4xl font-black mb-2 tracking-tighter uppercase italic">Business <span class="text-blue-500">Login</span></h1>
        <p class="text-slate-500 font-bold uppercase tracking-[0.2em] text-[10px] mb-12">Authorized Salon Access Only</p>
        <div class="space-y-4">
            <div class="relative">
                <i class="fa-solid fa-phone absolute left-5 top-6 text-slate-500 text-sm"></i>
                <input type="tel" id="l-phone" placeholder="REGISTERED PHONE" class="w-full p-6 pl-14 rounded-2xl font-bold text-sm">
            </div>
            <div class="relative">
                <i class="fa-solid fa-lock absolute left-5 top-6 text-slate-500 text-sm"></i>
                <input type="password" id="l-pass" placeholder="6-DIGIT PASSWORD" class="w-full p-6 pl-14 rounded-2xl font-bold text-sm" maxlength="6">
            </div>
            <button onclick="handleLogin()" id="login-btn"
                class="w-full gradient-blue text-white py-6 rounded-2xl font-black uppercase italic shadow-xl active:scale-95 transition-all">
                Initialize Dashboard
            </button>
            <div class="text-center pt-2 flex flex-col gap-2">
                <button onclick="showSetup()" class="text-[11px] font-black text-blue-400 uppercase tracking-widest py-2">
                    <i class="fa-solid fa-key mr-2"></i>First Time? Set Password
                </button>
                <button onclick="showForgot()" class="text-[10px] font-black text-slate-500 uppercase tracking-widest py-2 opacity-70">
                    <i class="fa-solid fa-rotate-left mr-2"></i>Forgot Password?
                </button>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════
         SETUP SCREEN (First Time Password)
    ══════════════════════════════════════ -->
    <div id="setup-screen" class="p-8 pt-20 hidden">
        <button onclick="showLogin()" class="text-slate-400 mb-6 flex items-center gap-2 text-sm font-bold">
            <i class="fa-solid fa-chevron-left"></i> Back
        </button>
        <div class="w-14 h-14 gradient-violet rounded-2xl flex items-center justify-center mb-6 shadow-xl">
            <i class="fa-solid fa-shield-halved text-white text-2xl"></i>
        </div>
        <h1 class="text-3xl font-black mb-1 tracking-tighter uppercase italic text-white">Setup <span class="text-blue-500">Access</span></h1>
        <p class="text-slate-500 font-bold uppercase tracking-[0.15em] text-[10px] mb-8">
            Sirf pehli baar password set karne ke liye
        </p>
        <div class="glass-card p-5 mb-6 flex items-start gap-3">
            <i class="fa-solid fa-circle-info text-blue-400 mt-0.5"></i>
            <p class="text-[10px] text-slate-400 leading-relaxed">
                Agent ne WhatsApp par jo <b class="text-white">User ID</b> bheja hai woh enter karein — format: <span class="text-blue-400 font-black">SAL1234</span>
            </p>
        </div>
        <div class="space-y-4">
            <div class="relative">
                <i class="fa-solid fa-id-card absolute left-5 top-6 text-slate-500 text-sm"></i>
                <input type="text" id="s-userid" placeholder="USER ID (e.g. SAL1234)" class="w-full p-6 pl-14 rounded-2xl font-bold text-sm uppercase">
            </div>
            <div class="relative">
                <i class="fa-solid fa-key absolute left-5 top-6 text-slate-500 text-sm"></i>
                <input type="password" id="s-pass" placeholder="SET 6-DIGIT PASSWORD" class="w-full p-6 pl-14 rounded-2xl font-bold text-sm" maxlength="6">
            </div>
            <div class="relative">
                <i class="fa-solid fa-key absolute left-5 top-6 text-slate-500 text-sm"></i>
                <input type="password" id="s-pass2" placeholder="CONFIRM 6-DIGIT PASSWORD" class="w-full p-6 pl-14 rounded-2xl font-bold text-sm" maxlength="6">
            </div>
            <button onclick="handleFirstTimeSetup()" id="setup-btn"
                class="w-full gradient-blue text-white py-6 rounded-2xl font-black uppercase italic shadow-xl active:scale-95 transition-all">
                <i class="fa-solid fa-circle-check mr-2"></i>Activate Account
            </button>
        </div>
    </div>

    <!-- ══════════════════════════════════════
         FORGOT PASSWORD SCREEN
    ══════════════════════════════════════ -->
    <div id="forgot-screen" class="p-8 pt-20 hidden">
        <button onclick="showLogin()" class="text-slate-400 mb-6 flex items-center gap-2 text-sm font-bold">
            <i class="fa-solid fa-chevron-left"></i> Back
        </button>
        <div class="w-14 h-14 gradient-amber rounded-2xl flex items-center justify-center mb-6 shadow-xl">
            <i class="fa-solid fa-rotate-left text-white text-2xl"></i>
        </div>
        <h1 class="text-3xl font-black mb-1 tracking-tighter uppercase italic">Reset <span class="text-amber-400">Password</span></h1>
        <p class="text-slate-500 font-bold uppercase tracking-[0.15em] text-[10px] mb-8">User ID se verify karein</p>
        <div class="space-y-4">
            <div class="relative">
                <i class="fa-solid fa-id-card absolute left-5 top-6 text-slate-500 text-sm"></i>
                <input type="text" id="f-userid" placeholder="USER ID (e.g. SAL1234)" class="w-full p-6 pl-14 rounded-2xl font-bold text-sm uppercase">
            </div>
            <div class="relative">
                <i class="fa-solid fa-key absolute left-5 top-6 text-slate-500 text-sm"></i>
                <input type="password" id="f-pass" placeholder="NEW 6-DIGIT PASSWORD" class="w-full p-6 pl-14 rounded-2xl font-bold text-sm" maxlength="6">
            </div>
            <button onclick="handleForgotPassword()" id="forgot-btn"
                class="w-full gradient-amber text-white py-6 rounded-2xl font-black uppercase italic shadow-xl active:scale-95 transition-all">
                <i class="fa-solid fa-rotate-left mr-2"></i>Reset Password
            </button>
        </div>
    </div>

    <!-- ══════════════════════════════════════
         MAIN PANEL
    ══════════════════════════════════════ -->
    <div id="main-panel" class="hidden pb-28">
        <!-- Sticky Header -->
        <div class="p-5 pt-10 flex justify-between items-center sticky top-0 bg-[#020617]/90 backdrop-blur-lg z-50 border-b border-white/5">
            <div>
                <p id="owner-name-display" class="text-[10px] font-black text-blue-400 uppercase italic tracking-widest"></p>
                <h1 id="salon-name-display" class="text-xl font-black uppercase text-white tracking-tighter leading-none"></h1>
            </div>
            <div class="flex items-center gap-3">
                <!-- Online/Offline Toggle -->
                <div class="flex items-center gap-2">
                    <label class="toggle-wrap">
                        <input type="checkbox" id="availability-toggle" onchange="toggleAvailability(this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                    <span id="avail-label" class="text-[9px] font-black uppercase text-slate-500">Offline</span>
                </div>
                <button onclick="location.reload()" class="w-10 h-10 glass-card flex items-center justify-center text-red-400 shadow-lg rounded-2xl">
                    <i class="fa-solid fa-power-off text-sm"></i>
                </button>
            </div>
        </div>
        <div id="content-view" class="p-5"></div>
    </div>

    <!-- Bottom Nav -->
    <nav id="navbar" class="fixed bottom-5 left-1/2 -translate-x-1/2 w-[94%] max-w-[420px] glass-card py-4 px-6 flex justify-between items-center z-50 hidden shadow-2xl">
        <button onclick="switchTab('bookings')" id="nav-bookings" class="nav-active flex flex-col items-center gap-1 relative">
            <i class="fa-solid fa-calendar-day text-xl"></i>
            <span class="text-[8px] font-black uppercase">Bookings</span>
            <span id="booking-notif" class="notif-dot hidden"></span>
        </button>
        <button onclick="switchTab('slots')" id="nav-slots" class="text-slate-500 flex flex-col items-center gap-1 transition-all">
            <i class="fa-solid fa-clock text-xl"></i>
            <span class="text-[8px] font-black uppercase">Slots</span>
        </button>
        <button onclick="switchTab('services')" id="nav-services" class="text-slate-500 flex flex-col items-center gap-1 transition-all">
            <i class="fa-solid fa-list-check text-xl"></i>
            <span class="text-[8px] font-black uppercase">Services</span>
        </button>
        <button onclick="switchTab('earnings')" id="nav-earnings" class="text-slate-500 flex flex-col items-center gap-1 transition-all">
            <i class="fa-solid fa-indian-rupee-sign text-xl"></i>
            <span class="text-[8px] font-black uppercase">Earnings</span>
        </button>
        <button onclick="switchTab('settings')" id="nav-settings" class="text-slate-500 flex flex-col items-center gap-1 transition-all">
            <i class="fa-solid fa-gear text-xl"></i>
            <span class="text-[8px] font-black uppercase">Settings</span>
        </button>
    </nav>
</div>

<script>
const SUPABASE_URL = 'https://mlflzzcvbnfuhcoojcmv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_izxuZIgnWWe13aUwQ5quPw_Kg76ioy4';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentSalon = null;
let notifInterval = null;

// ══════════════════════════════════════
// SCREEN NAVIGATION
// ══════════════════════════════════════
function showSetup()  { hide('login-screen'); hide('forgot-screen'); show('setup-screen'); }
function showLogin()  { hide('setup-screen'); hide('forgot-screen'); show('login-screen'); }
function showForgot() { hide('login-screen'); hide('setup-screen'); show('forgot-screen'); }
function show(id) { document.getElementById(id)?.classList.remove('hidden'); }
function hide(id) { document.getElementById(id)?.classList.add('hidden'); }

// ══════════════════════════════════════
// FIRST TIME SETUP  ← BUG FIXED HERE
// ══════════════════════════════════════
async function handleFirstTimeSetup() {
    const userId = document.getElementById('s-userid').value.trim().toUpperCase();
    const pass1  = document.getElementById('s-pass').value.trim();
    const pass2  = document.getElementById('s-pass2').value.trim();
    const btn    = document.getElementById('setup-btn');

    if (!userId) return alert("User ID daalna zaroori hai!\nAgent ne WhatsApp par bheja hai.");
    if (!pass1 || !pass2) return alert("Password aur confirm password bhariye!");
    if (pass1 !== pass2) return alert("Dono passwords match nahi karte!");
    if (pass1.length !== 6 || !/^\d+$/.test(pass1)) return alert("Sirf 6 angon ka password chahiye!\n(Jaise: 123456)");

    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Verifying...';
    btn.disabled = true;

    try {
        // owner_id se dhundho (agent jo generate karta hai)
        let { data, error } = await supabaseClient
            .from('salons')
            .select('id, owner_id, password, status')
            .eq('owner_id', userId)
            .maybeSingle();

        // Agar owner_id se nahi mila, user_id se try karo
        if (!data) {
            const res2 = await supabaseClient
                .from('salons')
                .select('id, owner_id, password, status')
                .eq('user_id', userId)
                .maybeSingle();
            data = res2.data;
            error = res2.error;
        }

        if (!data) {
            alert("❌ Yeh User ID registered nahi hai.\nAgent ne WhatsApp par jo ID bheja hai wahi enter karein.\nFormat: SAL1234");
            return;
        }

        if (data.status === 'blocked') {
            alert("🚫 Account block hai. Admin se contact karein.");
            return;
        }

        // Agar password pehle se set hai
        if (data.password && data.password.trim() !== '') {
            alert("⚠️ Is account ka password pehle se set hai!\nAgar bhool gaye hain toh 'Forgot Password' use karein.");
            showLogin();
            return;
        }

        const { error: updateError } = await supabaseClient
            .from('salons')
            .update({ password: pass1 })
            .eq('id', data.id);

        if (!updateError) {
            alert("✅ Password set ho gaya!\nAb mobile number aur password se login karein.");
            // Fields clear karo
            document.getElementById('s-userid').value = '';
            document.getElementById('s-pass').value = '';
            document.getElementById('s-pass2').value = '';
            showLogin();
        } else {
            alert("❌ Password save nahi hua.\nError: " + updateError.message);
        }
    } catch (e) {
        alert("❌ Server error!\nInternet connection check karein.\n" + e.message);
    } finally {
        btn.innerHTML = '<i class="fa-solid fa-circle-check mr-2"></i>Activate Account';
        btn.disabled = false;
    }
}

// ══════════════════════════════════════
// FORGOT PASSWORD
// ══════════════════════════════════════
async function handleForgotPassword() {
    const userId = document.getElementById('f-userid').value.trim().toUpperCase();
    const pass   = document.getElementById('f-pass').value.trim();
    const btn    = document.getElementById('forgot-btn');

    if (!userId) return alert("User ID daalna zaroori hai!");
    if (!pass) return alert("Naya password bhariye!");
    if (pass.length !== 6 || !/^\d+$/.test(pass)) return alert("Sirf 6 angon ka password chahiye!\n(Jaise: 123456)");

    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Verifying...';
    btn.disabled = true;

    try {
        let { data } = await supabaseClient
            .from('salons').select('id').eq('owner_id', userId).maybeSingle();

        if (!data) {
            const res2 = await supabaseClient
                .from('salons').select('id').eq('user_id', userId).maybeSingle();
            data = res2.data;
        }

        if (!data) {
            alert("❌ Yeh User ID registered nahi hai.\nAgent ne jo ID bheja hai wahi enter karein.");
            return;
        }

        const { error: upErr } = await supabaseClient
            .from('salons').update({ password: pass }).eq('id', data.id);

        if (!upErr) {
            alert("✅ Password reset ho gaya!\nAb mobile number aur naye password se login karein.");
            document.getElementById('f-userid').value = '';
            document.getElementById('f-pass').value = '';
            showLogin();
        } else {
            alert("❌ Error: " + upErr.message);
        }
    } catch(e) {
        alert("❌ Server error! " + e.message);
    } finally {
        btn.innerHTML = '<i class="fa-solid fa-rotate-left mr-2"></i>Reset Password';
        btn.disabled = false;
    }
}

// ══════════════════════════════════════
// LOGIN
// ══════════════════════════════════════
async function handleLogin() {
    const btn   = document.getElementById('login-btn');
    const phone = document.getElementById('l-phone').value.trim();
    const pass  = document.getElementById('l-pass').value.trim();

    if (!phone || !pass) return alert("Details fill karein.");
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Processing...';
    btn.disabled = true;

    try {
        const { data, error } = await supabaseClient
            .from('salons').select('*').eq('phone', phone).eq('password', pass);

        if (data && data.length > 0) {
            const salon = data[0];

            // ── BLOCK CHECK ──
            if (salon.status === 'blocked') {
                alert("🚫 Aapka salon account block kar diya gaya hai. Admin se contact karein.");
                btn.innerHTML = 'Initialize Dashboard';
                btn.disabled = false;
                return;
            }

            currentSalon = salon;
            hide('login-screen');
            show('main-panel');
            show('navbar');
            document.getElementById('salon-name-display').innerText = currentSalon.name || 'My Salon';
            document.getElementById('owner-name-display').innerText = `Hello, ${currentSalon.owner_name || 'Owner'}`;

            // Set availability toggle
            const toggle = document.getElementById('availability-toggle');
            toggle.checked = currentSalon.is_online || false;
            document.getElementById('avail-label').innerText = toggle.checked ? 'Online' : 'Offline';
            document.getElementById('avail-label').style.color = toggle.checked ? '#34d399' : '#64748b';

            switchTab('bookings');
            startNotifPoll();
        } else {
            alert("❌ Phone ya password galat hai!");
        }
    } catch (err) {
        alert("Login Error! Internet check karein.");
    } finally {
        btn.innerHTML = 'Initialize Dashboard';
        btn.disabled = false;
    }
}

// ══════════════════════════════════════
// AVAILABILITY TOGGLE
// ══════════════════════════════════════
async function toggleAvailability(isOnline) {
    document.getElementById('avail-label').innerText = isOnline ? 'Online' : 'Offline';
    document.getElementById('avail-label').style.color = isOnline ? '#34d399' : '#64748b';
    await supabaseClient.from('salons').update({ is_online: isOnline }).eq('id', currentSalon.id);
    currentSalon.is_online = isOnline;
}

// ══════════════════════════════════════
// NOTIFICATION POLL
// ══════════════════════════════════════
function startNotifPoll() {
    checkNewBookings();
    notifInterval = setInterval(checkNewBookings, 30000);
    // Block status check every 60 seconds for already-logged-in salons
    setInterval(async () => {
        if (!currentSalon) return;
        const { data } = await supabaseClient.from('salons').select('status').eq('id', currentSalon.id).single();
        if (data && data.status === 'blocked') {
            clearInterval(notifInterval);
            currentSalon = null;
            hide('main-panel'); hide('navbar');
            show('login-screen');
            alert("🚫 Aapka account admin ne block kar diya hai. Admin se contact karein.");
        }
    }, 60000);
}
async function checkNewBookings() {
    const { data } = await supabaseClient
        .from('bookings').select('id').eq('salon_id', currentSalon.id).eq('status', 'pending');
    const dot = document.getElementById('booking-notif');
    if (data && data.length > 0) { dot?.classList.remove('hidden'); }
    else { dot?.classList.add('hidden'); }
}

// ══════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════
function switchTab(tab) {
    document.querySelectorAll('nav button').forEach(b => {
        b.classList.remove('nav-active');
        b.classList.add('text-slate-500');
    });

        const statusLabel = b.status === 'confirmed' ? 'Confirmed' :
                            b.status === 'cancelled' ? 'Cancelled' : 'Pending';

                <div>

                    <p class="text-[10px] text-slate-400"><i class="fa-solid fa-credit-card mr-1"></i>${b.payment_method || 'N/A'} • ₹${b.price || 0}</p>
                </div>
            </div>
            ${b.status === 'pending' ? `
            <div class="flex gap-2">
                <button onclick="updateBookingStatus('${b.id}','confirmed')"
                    class="flex-1 py-3 rounded-xl font-black text-[10px] uppercase" style="background:rgba(16,185,129,0.2);color:#34d399;border:1px solid rgba(16,185,129,0.3)">
                    <i class="fa-solid fa-check mr-1"></i>Accept
                </button>
                <button onclick="updateBookingStatus('${b.id}','cancelled')"
                    class="flex-1 py-3 rounded-xl font-black text-[10px] uppercase" style="background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3)">
                    <i class="fa-solid fa-xmark mr-1"></i>Reject

            </div>` : b.status === 'confirmed' ? `
            <div class="flex flex-col gap-2">
                <button onclick="openVerifyCode('${b.id}')" class="w-full py-3 rounded-xl font-black text-[10px] uppercase" style="background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3)">

function canCancelBooking(b) {
    if (!b.booking_date || !b.booking_time) return true;
    const bookingDT = new Date(`${b.booking_date}T${b.booking_time}`);
    const now = new Date();
    const diffHrs = (bookingDT - now) / 36e5;
    return diffHrs > 2; // Only allow cancel if more than 2 hours remain
}

async function verifyAndComplete(bookingId) {
    const inputCode = document.getElementById('verify-code-input').value.trim();
    const errEl = document.getElementById('verify-err');
    errEl.style.display = 'none';

    if (!inputCode || inputCode.length !== 5) {
        errEl.style.display = 'block';
        errEl.textContent = '❌ 5-digit code daalo!';
        return;
    }

    // Fetch booking from DB and check code
    const { data: booking, error } = await supabaseClient
        .from('bookings').select('booking_code, status').eq('id', bookingId).single();

    if (error || !booking) {
        errEl.style.display = 'block';
        errEl.textContent = '❌ Booking nahi mili!';
        return;
    }
    if (booking.status === 'completed') {
        errEl.style.display = 'block';
        errEl.textContent = '⚠️ Yeh booking pehle se complete hai!';
        return;
    }
    if (String(booking.booking_code) !== String(inputCode)) {
        errEl.style.display = 'block';
        errEl.textContent = '❌ Galat code! Customer se dobara check karo.';
        return;
    }

    // Code matched — mark complete
    await supabaseClient.from('bookings').update({ status: 'completed' }).eq('id', bookingId);
    document.getElementById('verify-modal').remove();

    // Show success toast
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;padding:14px 24px;border-radius:14px;font-size:13px;font-weight:900;background:rgba(16,185,129,0.15);color:#34d399;border:1px solid rgba(16,185,129,0.3);backdrop-filter:blur(10px);white-space:nowrap;';
    t.textContent = '✅ Service Complete! Booking closed.';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);

    renderBookings();
}

async function updateBookingStatus(id, status) {
    await supabaseClient.from('bookings').update({ status }).eq('id', id);
    renderBookings();

async function cancelConfirmedBooking(id, date, time) {
    const bookingDT = new Date(`${date}T${time}`);
    const diffHrs = (bookingDT - new Date()) / 36e5;
    if (diffHrs <= 2) {
        alert("❌ 2 ghante se kam time raha hai — ab cancel nahi ho sakta!\nPolicy: Sirf 2+ ghante pehle cancel allowed hai.");
        return;
    }
    if (!confirm("Yeh confirmed booking cancel karein?")) return;
    await supabaseClient.from('bookings').update({ status: 'cancelled' }).eq('id', id);
    renderBookings();
}

function generateTimeSlots(open, close, duration) {
    const slots = [];
    let [h, m] = open.split(':').map(Number);
    const [ch, cm] = close.split(':').map(Number);
    const endMins = ch * 60 + cm;
    while (h * 60 + m < endMins) {
        slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
        m += duration;
        if (m >= 60) { h += Math.floor(m/60); m = m % 60; }
    }
    return slots;
}

function toggleDay(day) {
    let days = currentSalon.work_days || ['Mon','Tue','Wed','Thu','Fri','Sat'];
    if (days.includes(day)) days = days.filter(d => d !== day);
    else days.push(day);
    currentSalon.work_days = days;
    const pill = document.getElementById(`day-${day}`);
    pill.classList.toggle('on', days.includes(day));
    supabaseClient.from('salons').update({ work_days: days }).eq('id', currentSalon.id);
}

async function saveWorkingHours() {
    const open  = document.getElementById('slot-open').value;
    const close = document.getElementById('slot-close').value;
    const dur   = parseInt(document.getElementById('slot-dur').value);
    await supabaseClient.from('salons').update({ open_time: open, close_time: close, slot_duration: dur }).eq('id', currentSalon.id);
    currentSalon.open_time = open; currentSalon.close_time = close; currentSalon.slot_duration = dur;
    alert("✅ Working hours saved!");
    renderSlots();
}

async function toggleSlotBlock(time) {
    let blocked = Array.isArray(currentSalon.blocked_slots) ? [...currentSalon.blocked_slots] : [];
    if (blocked.includes(time)) blocked = blocked.filter(t => t !== time);
    else blocked.push(time);
    currentSalon.blocked_slots = blocked;
    await supabaseClient.from('salons').update({ blocked_slots: blocked }).eq('id', currentSalon.id);
    const key = time.replace(':','-');
    const el  = document.getElementById(`slot-${key}`);
    if (el) {
        el.className = `slot-cell ${blocked.includes(time) ? 'slot-blocked' : 'slot-free'}`;
    }
}

                        <span class="absolute left-3 top-4 text-slate-400 font-bold">%</span>
                        <input type="number" id="svc-tax" value="${svc.tax || ''}" placeholder="Tax %" class="w-full pl-8 p-4 rounded-xl text-sm font-bold">
                    </div>
                    <div class="flex-1 relative">
                        <span class="absolute left-3 top-4 text-slate-400 font-bold">₹</span>
                        <input type="number" id="svc-extra" value="${svc.extra_charge || ''}" placeholder="Extra Charge" class="w-full pl-7 p-4 rounded-xl text-sm font-bold">
                    </div>
                </div>
                <button onclick="saveService(${idx})" class="w-full py-4 rounded-xl font-black text-[10px] uppercase gradient-blue">
                    <i class="fa-solid fa-save mr-2"></i>${isEdit ? 'Update' : 'Add'} Service
                </button>
            </div>
        </div>
    </div>`);
}

async function saveService(idx) {
    const name  = document.getElementById('svc-name').value.trim();
    const price = parseFloat(document.getElementById('svc-price').value) || 0;
    const dur   = parseInt(document.getElementById('svc-dur').value);
    const desc  = document.getElementById('svc-desc').value.trim();
    const tax   = parseFloat(document.getElementById('svc-tax').value) || 0;
    const extra = parseFloat(document.getElementById('svc-extra').value) || 0;
    if (!name) return alert("Service name daalna zaroori hai!");

    let services = [...(currentSalon.services || [])];
    const entry = { name, service: name, price, slotTime: dur, duration: dur, description: desc, tax, extra_charge: extra };
    if (idx >= 0) services[idx] = { ...services[idx], ...entry };
    else services.push(entry);

    await supabaseClient.from('salons').update({ services: JSON.stringify(services) }).eq('id', currentSalon.id);
    currentSalon.services = services;
    document.getElementById('svc-modal')?.remove();
    renderServices();
}

async function deleteService(i) {
    if (!confirm("Yeh service delete karein?")) return;
    let services = [...(currentSalon.services || [])];
    services.splice(i, 1);
    await supabaseClient.from('salons').update({ services: JSON.stringify(services) }).eq('id', currentSalon.id);
    currentSalon.services = services;
    renderServices();
}

// ══════════════════════════════════════
// EARNINGS TAB
// ══════════════════════════════════════
async function renderEarnings(period = 'today') {
    const cv = document.getElementById('content-view');
    cv.innerHTML = `<div class="flex justify-center py-10"><i class="fa-solid fa-spinner fa-spin text-blue-400 text-2xl"></i></div>`;

    const now   = new Date();
    const today = now.toISOString().split('T')[0];

    let fromDate = today;
    if (period === 'week') {
        const d = new Date(now); d.setDate(d.getDate() - 7);
        fromDate = d.toISOString().split('T')[0];
    } else if (period === 'month') {
        fromDate = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
    }

    const { data: bookings } = await supabaseClient
        .from('bookings')
        .select('*')
        .eq('salon_id', currentSalon.id)
        .eq('status', 'confirmed')
        .gte('booking_date', fromDate);

    const total      = (bookings || []).reduce((s, b) => s + (b.price || 0), 0);
    const commission = (bookings || []).length * 5; // ₹5 per booking
    const net        = total - commission;

    cv.innerHTML = `
    <h2 class="text-2xl font-black uppercase italic mb-5">Earnings <span class="text-emerald-400">Report</span></h2>

    <!-- Period Filter -->
    <div class="flex gap-2 mb-5">
        ${['today','week','month'].map(p => `
        <button onclick="renderEarnings('${p}')"
            class="flex-1 py-3 rounded-xl font-black text-[10px] uppercase ${period===p ? 'gradient-blue' : 'glass-card text-slate-400'}">
            ${p === 'today' ? 'Today' : p === 'week' ? '7 Days' : 'Month'}
        </button>`).join('')}
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-2 gap-3 mb-5">
        <div class="glass-card p-5 border-t-2 border-emerald-500">
            <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Gross Earnings</p>
            <h2 class="text-2xl font-black italic text-emerald-400">₹${total}</h2>
        </div>
        <div class="glass-card p-5 border-t-2 border-blue-500">
            <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Net Earnings</p>
            <h2 class="text-2xl font-black italic text-blue-400">₹${net}</h2>
        </div>
        <div class="glass-card p-5 border-t-2 border-amber-500">
            <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Bookings</p>
            <h2 class="text-2xl font-black italic text-amber-400">${(bookings||[]).length}</h2>
        </div>
        <div class="glass-card p-5 border-t-2 border-red-500">
            <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Commission (₹5 each)</p>
            <h2 class="text-2xl font-black italic text-red-400">-₹${commission}</h2>
        </div>
    </div>

    <!-- Commission Info -->
    <div class="glass-card p-4 flex items-start gap-3 mb-5">
        <i class="fa-solid fa-circle-info text-blue-400 mt-0.5 flex-shrink-0"></i>
        <p class="text-[9px] text-slate-400 leading-relaxed">
            Har confirmed booking par <b class="text-white">₹5 platform commission</b> liya jata hai. Net earning = Gross - Commission.
        </p>
    </div>

    <!-- Booking Breakdown -->
    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-3">Confirmed Bookings</p>
    <div class="space-y-2">
        ${(bookings||[]).slice(0,20).map(b => `
        <div class="flex justify-between items-center p-3 rounded-xl" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05)">
            <div>
                <p class="text-xs font-black text-white">${b.customer_name || 'Customer'}</p>
                <p class="text-[9px] text-slate-500">${b.service_name || ''} • ${b.booking_date || ''}</p>
            </div>
            <div class="text-right">
                <p class="font-black text-emerald-400 text-sm">₹${b.price || 0}</p>
                <p class="text-[9px] text-slate-600">-₹5 comm</p>
            </div>
        </div>`).join('') || '<p class="text-slate-600 text-xs text-center py-4">Is period mein koi booking nahi</p>'}
    </div>`;
}

// ══════════════════════════════════════
// SETTINGS TAB
// ══════════════════════════════════════
async function renderSettings() {
    const { data } = await supabaseClient.from('salons').select('*').eq('id', currentSalon.id).single();
    if (data) currentSalon = data;

    const cv = document.getElementById('content-view');
    cv.innerHTML = `
    <h2 class="text-2xl font-black uppercase italic mb-5">Settings <span class="text-blue-500">Panel</span></h2>

    <!-- Profile Update -->
    <div class="glass-card p-5 mb-4">
        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">
            <i class="fa-solid fa-shop mr-2"></i>Salon Profile
        </p>
        <div class="space-y-3">
            <input type="text" id="set-name" value="${currentSalon.name || ''}" placeholder="Salon Name" class="w-full p-4 rounded-xl text-sm font-bold">
            <input type="text" id="set-owner" value="${currentSalon.owner_name || ''}" placeholder="Owner Name" class="w-full p-4 rounded-xl text-sm font-bold">
            <input type="tel"  id="set-phone" value="${currentSalon.phone || ''}" placeholder="Phone" class="w-full p-4 rounded-xl text-sm font-bold">
            <textarea id="set-addr" placeholder="Salon Address" class="w-full p-4 rounded-xl text-sm font-bold" rows="2">${currentSalon.address || ''}</textarea>
            <button onclick="saveProfile()" class="w-full gradient-blue py-4 rounded-xl font-black text-[10px] uppercase">
                <i class="fa-solid fa-save mr-2"></i>Save Profile
            </button>
        </div>
    </div>

    <!-- Cancellation Policy Info -->
    <div class="glass-card p-5 mb-4" style="border: 1px solid rgba(239,68,68,0.2)">
        <p class="text-[9px] font-black text-red-400 uppercase tracking-widest mb-3">
            <i class="fa-solid fa-ban mr-2"></i>Cancellation Policy
        </p>
        <p class="text-[10px] text-slate-400 leading-relaxed">
            Salon owner booking <b class="text-white">sirf 2 ghante pehle</b> cancel kar sakta hai.<br>
            Booking time se 2 ghante ke andar cancel <b class="text-red-400">allowed nahi</b> hai.
        </p>
    </div>

    <!-- Reviews -->
    <div class="glass-card p-5 mb-4">
        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-3">
            <i class="fa-solid fa-star mr-2"></i>Customer Reviews
        </p>
        <div id="reviews-list">
            <div class="flex justify-center py-4"><i class="fa-solid fa-spinner fa-spin text-slate-400"></i></div>
        </div>
    </div>

    <!-- Offers & Discounts -->
    <div class="glass-card p-5 mb-4">
        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">
            <i class="fa-solid fa-tag mr-2"></i>Active Offer
        </p>
        <input type="text" id="set-offer" value="${currentSalon.offer_text || ''}" placeholder="e.g. 20% off on Facial this weekend!" class="w-full p-4 rounded-xl text-sm font-bold mb-3">
        <button onclick="saveOffer()" class="w-full py-4 rounded-xl font-black text-[10px] uppercase" style="background:linear-gradient(135deg,#f59e0b,#b45309)">
            <i class="fa-solid fa-tag mr-2"></i>Save Offer
        </button>
    </div>

    <!-- Payment Settings -->
    <div class="glass-card p-5 mb-4">
        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">
            <i class="fa-solid fa-wallet mr-2"></i>Payment Settings
        </p>
        <input type="text" id="set-upi" value="${currentSalon.upi_id || ''}" placeholder="UPI ID" class="w-full p-4 rounded-xl text-sm font-bold mb-3">
        <div class="flex items-center justify-between mb-3">
            <p class="text-xs font-black text-white">Accept Cash</p>
            <label class="toggle-wrap">
                <input type="checkbox" id="set-cash" ${currentSalon.accept_cash ? 'checked' : ''} onchange="saveCashOption(this.checked)">
                <span class="toggle-slider"></span>
            </label>
        </div>
        <button onclick="savePaymentSettings()" class="w-full gradient-emerald py-4 rounded-xl font-black text-[10px] uppercase text-white">
            <i class="fa-solid fa-save mr-2"></i>Save Payment Settings
        </button>
    </div>

    <!-- Password Update -->
    <div class="glass-card p-5 mb-4">
        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">
            <i class="fa-solid fa-shield-halved mr-2"></i>Update Password
        </p>
        <div class="space-y-3">
            <input type="password" id="old-p" placeholder="Old Password" class="w-full p-4 rounded-xl text-sm font-bold" maxlength="6">
            <input type="password" id="new-p" placeholder="New 6-Digit Password" class="w-full p-4 rounded-xl text-sm font-bold" maxlength="6">
            <button onclick="updatePassword()" class="w-full gradient-blue py-4 rounded-xl font-black text-[10px] uppercase">
                <i class="fa-solid fa-key mr-2"></i>Update Password
            </button>
        </div>
    </div>`;

    loadReviews();
}

async function loadReviews() {
    const { data } = await supabaseClient
        .from('reviews').select('*').eq('salon_id', currentSalon.id).order('created_at', { ascending: false }).limit(10);
    const el = document.getElementById('reviews-list');
    if (!el) return;
    if (!data || !data.length) {
        el.innerHTML = '<p class="text-[10px] text-slate-600 text-center py-2">Koi review nahi abhi tak</p>';
        return;
    }
    const avg = (data.reduce((s,r) => s + (r.rating || 0), 0) / data.length).toFixed(1);
    el.innerHTML = `
    <div class="flex items-center gap-2 mb-3">
        <span class="text-2xl font-black text-amber-400">${avg}</span>
        <div>
            <div class="flex gap-0.5">${[1,2,3,4,5].map(n => `<i class="fa-solid fa-star text-sm ${n <= Math.round(avg) ? 'text-amber-400' : 'text-slate-700'}"></i>`).join('')}</div>
            <p class="text-[9px] text-slate-500">${data.length} reviews</p>
        </div>
    </div>
    ${data.slice(0,5).map(r => `
    <div class="py-2 border-b border-white/5">
        <div class="flex justify-between items-center">
            <p class="text-xs font-black text-white">${r.customer_name || 'Customer'}</p>
            <div class="flex gap-0.5">${[1,2,3,4,5].map(n=>`<i class="fa-solid fa-star text-[10px] ${n<=r.rating?'text-amber-400':'text-slate-700'}"></i>`).join('')}</div>
        </div>
        ${r.comment ? `<p class="text-[9px] text-slate-400 mt-0.5">${r.comment}</p>` : ''}
    </div>`).join('')}`;
}

async function saveProfile() {
    const updates = {
        name: document.getElementById('set-name').value.trim(),
        owner_name: document.getElementById('set-owner').value.trim(),
        phone: document.getElementById('set-phone').value.trim(),
        address: document.getElementById('set-addr').value.trim(),
    };
    const { error } = await supabaseClient.from('salons').update(updates).eq('id', currentSalon.id);
    if (!error) {
        Object.assign(currentSalon, updates);
        document.getElementById('salon-name-display').innerText = updates.name || currentSalon.name;
        alert("✅ Profile updated!");
    } else { alert("Error: " + error.message); }
}

async function saveOffer() {
    const offer = document.getElementById('set-offer').value.trim();
    await supabaseClient.from('salons').update({ offer_text: offer }).eq('id', currentSalon.id);
    currentSalon.offer_text = offer;
    alert("✅ Offer saved!");
}

async function savePaymentSettings() {
    const upi  = document.getElementById('set-upi').value.trim();
    const cash = document.getElementById('set-cash').checked;
    await supabaseClient.from('salons').update({ upi_id: upi, accept_cash: cash }).eq('id', currentSalon.id);
    currentSalon.upi_id = upi; currentSalon.accept_cash = cash;
    alert("✅ Payment settings saved!");
}

async function saveCashOption(val) {
    await supabaseClient.from('salons').update({ accept_cash: val }).eq('id', currentSalon.id);
    currentSalon.accept_cash = val;
}

async function updatePassword() {
    const oldP = document.getElementById('old-p').value;
    const newP = document.getElementById('new-p').value;
    if (oldP !== currentSalon.password) return alert("❌ Purana password galat hai!");
    if (newP.length !== 6 || !/^\d+$/.test(newP)) return alert("6-digit numeric password chahiye!");
    const { error } = await supabaseClient.from('salons').update({ password: newP }).eq('id', currentSalon.id);
    if (!error) { alert("✅ Password update ho gaya!"); currentSalon.password = newP; }
}

function closeModal(id, event) {
    if (event.target.classList.contains('modal-bg')) document.getElementById(id)?.remove();
}
