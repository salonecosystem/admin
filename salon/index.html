<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Salon AI — Owner Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Salon Owner Pro">
    <meta name="theme-color" content="#3b82f6">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .wrap { max-width: 450px; margin: 0 auto; min-height: 100vh; background: #020617; position: relative; padding-bottom: 110px; }
        .glass { background: rgba(30,41,59,0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
        .g-blue { background: linear-gradient(135deg, #3b82f6, #1e40af); }
        .g-green { background: linear-gradient(135deg, #10b981, #047857); }
        .g-violet { background: linear-gradient(135deg, #7c3aed, #4c1d95); }
        .g-amber { background: linear-gradient(135deg, #f59e0b, #b45309); }
        .g-red { background: linear-gradient(135deg, #ef4444, #991b1b); }
        input, select, textarea { background: rgba(255,255,255,0.06) !important; border: 1px solid rgba(255,255,255,0.12) !important; color: white !important; outline: none; border-radius: 0.75rem; width: 100%; padding: 14px 16px; font-size: 13px; font-weight: 700; font-family: 'Plus Jakarta Sans', sans-serif; }
        input:focus, select:focus { border-color: #3b82f6 !important; }
        input::placeholder, textarea::placeholder { color: #475569 !important; }
        select option { background: #0f172a; }
        .nav-active { color: #60a5fa !important; filter: drop-shadow(0 0 8px rgba(96,165,250,0.5)); }
        .hidden { display: none !important; }
        .toggle-wrap { position: relative; display: inline-block; width: 56px; height: 28px; }
        .toggle-wrap input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; inset: 0; background: rgba(255,255,255,0.1); border-radius: 28px; cursor: pointer; transition: 0.3s; }
        .toggle-slider:before { content: ''; position: absolute; width: 22px; height: 22px; left: 3px; bottom: 3px; background: #64748b; border-radius: 50%; transition: 0.3s; }
        input:checked + .toggle-slider { background: linear-gradient(135deg, #10b981, #047857); }
        input:checked + .toggle-slider:before { transform: translateX(28px); background: white; }
        .pill { padding: 3px 10px; border-radius: 20px; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; }
        .pill-green { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
        .pill-amber { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
        .pill-red { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
        .pill-blue { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
        .pill-purple { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
        .modal-box { background: #0f172a; border-radius: 2rem 2rem 0 0; padding: 1.8rem; width: 100%; max-width: 450px; border-top: 1px solid rgba(255,255,255,0.1); max-height: 88vh; overflow-y: auto; }
        .booking-card { background: rgba(30,41,59,0.5); border: 1px solid rgba(255,255,255,0.07); border-radius: 1.5rem; padding: 1rem 1.2rem; margin-bottom: 12px; }
        .slot-cell { border-radius: 10px; padding: 6px 4px; font-size: 9px; font-weight: 700; text-align: center; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .slot-free { background: rgba(16,185,129,0.12); color: #34d399; border-color: rgba(16,185,129,0.25); }
        .slot-blocked { background: rgba(239,68,68,0.12); color: #f87171; border-color: rgba(239,68,68,0.25); }
        .slot-booked { background: rgba(59,130,246,0.12); color: #60a5fa; border-color: rgba(59,130,246,0.25); cursor: default; }
        .day-pill { padding: 8px 14px; border-radius: 20px; font-size: 10px; font-weight: 900; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: #64748b; transition: all 0.2s; }
        .day-pill.on { border-color: #3b82f6; background: rgba(59,130,246,0.15); color: #60a5fa; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .notif-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; position: absolute; top: -2px; right: -2px; border: 2px solid #020617; }
        @keyframes slideDown { from{opacity:0;transform:translateX(-50%) translateY(-20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner-sm { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
    </style>
</head>
<body>
<div id="app" class="wrap">

<!-- LOGIN SCREEN -->
<div id="login-screen" class="p-8 pt-24">
    <div class="w-20 h-20 g-blue rounded-3xl flex items-center justify-center mb-10 rotate-3 shadow-2xl shadow-blue-500/30">
        <i class="fa-solid fa-shop text-white text-4xl"></i>
    </div>
    <h1 class="text-4xl font-black mb-2 tracking-tighter uppercase italic">Business <span class="text-blue-500">Login</span></h1>
    <p class="text-slate-500 font-bold uppercase tracking-[0.2em] text-[10px] mb-12">Authorized Salon Access Only</p>
    <div class="space-y-4">
        <div class="relative">
            <i class="fa-solid fa-phone absolute left-5 top-5 text-slate-500 text-sm"></i>
            <input type="tel" id="l-phone" placeholder="Registered Phone" class="w-full p-5 pl-14 rounded-2xl font-bold text-sm">
        </div>
        <div class="relative">
            <i class="fa-solid fa-lock absolute left-5 top-5 text-slate-500 text-sm"></i>
            <input type="password" id="l-pass" placeholder="Password" class="w-full p-5 pl-14 rounded-2xl font-bold text-sm" onkeydown="if(event.key==='Enter')handleLogin()">
        </div>
        <div id="login-err" class="hidden text-red-400 text-xs font-bold text-center p-3 bg-red-500/10 rounded-xl border border-red-500/20"></div>
        <button onclick="handleLogin()" class="w-full g-blue text-white font-black py-5 rounded-2xl text-sm uppercase tracking-wider">
            <i class="fa-solid fa-right-to-bracket mr-2"></i>Login
        </button>
        <button onclick="showForgotPass()" class="w-full text-center text-[10px] font-800 text-slate-500 uppercase tracking-widest bg-none border-none cursor-pointer py-2">
            Forgot Password?
        </button>
    </div>
</div>

<!-- FORGOT PASSWORD MODAL -->
<div id="forgot-modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-end justify-center">
    <div class="bg-[#0f172a] rounded-t-3xl p-7 w-full max-w-[450px] border-t border-white/10">
        <h3 class="font-black uppercase italic text-sm text-blue-400 mb-5">Reset Password</h3>
        <div class="space-y-3">
            <input type="tel" id="fp-phone" placeholder="Registered Phone" class="w-full p-4 rounded-xl text-sm font-bold">
            <input type="password" id="fp-newpass" placeholder="New Password" class="w-full p-4 rounded-xl text-sm font-bold">
            <button onclick="handleForgotPass()" class="w-full g-blue text-white py-4 rounded-xl font-black text-xs uppercase">Reset Password</button>
            <button onclick="document.getElementById('forgot-modal').classList.add('hidden')" class="w-full text-slate-500 text-xs font-bold uppercase py-2 bg-none border-none cursor-pointer">Cancel</button>
        </div>
    </div>
</div>

<!-- MAIN PANEL -->
<div id="main-panel" class="hidden">
    <!-- TOP BAR -->
    <div class="flex items-center justify-between p-5 sticky top-0 z-10" style="background:rgba(2,6,23,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05);">
        <div>
            <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">SALON AI — OWNER</p>
            <p id="salon-name-display" class="font-black text-base mt-0.5"></p>
        </div>
        <div class="flex items-center gap-3">
            <!-- Online/Offline Toggle -->
            <div class="flex items-center gap-2">
                <span id="status-label" class="text-[9px] font-black uppercase tracking-wider text-slate-500">Offline</span>
                <label class="toggle-wrap">
                    <input type="checkbox" id="online-toggle" onchange="toggleOnlineStatus(this.checked)">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <button onclick="logout()" class="w-9 h-9 rounded-xl flex items-center justify-center text-slate-500" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);">
                <i class="fa-solid fa-power-off text-xs"></i>
            </button>
        </div>
    </div>

    <!-- CONTENT VIEW -->
    <div id="content-view" class="p-5"></div>
</div>

</div>

<!-- BOTTOM NAV -->
<nav id="navbar" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 w-[92%] max-w-[400px] glass py-4 px-6 flex justify-between items-center z-50 shadow-2xl" style="border-radius:2rem">
    <button onclick="switchTab('bookings')" id="nav-bookings" class="text-slate-500 text-xl transition-all relative">
        <i class="fa-solid fa-calendar-check"></i>
        <span id="booking-notif" class="notif-dot hidden"></span>
    </button>
    <button onclick="switchTab('slots')" id="nav-slots" class="text-slate-500 text-xl transition-all"><i class="fa-solid fa-clock"></i></button>
    <button onclick="switchTab('services')" id="nav-services" class="g-blue w-14 h-14 rounded-2xl shadow-xl -mt-10 border-[6px] border-[#020617] flex items-center justify-center"><i class="fa-solid fa-scissors text-xl"></i></button>
    <button onclick="switchTab('earnings')" id="nav-earnings" class="text-slate-500 text-xl transition-all"><i class="fa-solid fa-indian-rupee-sign"></i></button>
    <button onclick="switchTab('settings')" id="nav-settings" class="text-slate-500 text-xl transition-all"><i class="fa-solid fa-gear"></i></button>
</nav>

<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const SUPABASE_URL = 'https://mlflkkcvbnfuhcoojcmv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_izxuZIgnWWe13aUwQ5quPw_Kg99ioy4';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentSalon = JSON.parse(localStorage.getItem('salonOwner')) || null;
let notifInterval = null;

// ─── UTILS ───
const show = id => document.getElementById(id)?.classList.remove('hidden');
const hide = id => document.getElementById(id)?.classList.add('hidden');

function toast(msg, type = 'green') {
    let t = document.getElementById('salon-toast');
    if (!t) { t = document.createElement('div'); t.id = 'salon-toast'; t.style.cssText = 'position:fixed;bottom:140px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:14px;font-size:12px;font-weight:800;max-width:90vw;text-align:center;font-family:Plus Jakarta Sans,sans-serif;transition:opacity .3s;'; document.body.appendChild(t); }
    t.textContent = msg;
    t.style.background = type === 'red' ? 'rgba(239,68,68,0.9)' : type === 'amber' ? 'rgba(245,158,11,0.9)' : 'rgba(16,185,129,0.9)';
    t.style.color = 'white';
    t.style.opacity = '1';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.style.opacity = '0', 3000);
}

// ─── INIT ───
window.onload = function() {
    if (currentSalon) afterLogin();
    // else show login screen (already visible)
};

// ─── AUTH ───
async function handleLogin() {
    const phone = document.getElementById('l-phone').value.trim();
    const pass = document.getElementById('l-pass').value.trim();
    const errEl = document.getElementById('login-err');
    errEl.classList.add('hidden');

    if (!phone || !pass) { errEl.textContent = 'Fill all fields'; errEl.classList.remove('hidden'); return; }

    const { data, error } = await sb.from('salons').select('*').eq('phone', phone).single();
    if (error || !data) { errEl.textContent = '❌ Account not found'; errEl.classList.remove('hidden'); return; }
    if (data.password !== pass) { errEl.textContent = '❌ Wrong password'; errEl.classList.remove('hidden'); return; }
    if (data.status === 'blocked') { errEl.textContent = '🚫 Account blocked. Contact admin.'; errEl.classList.remove('hidden'); return; }
    if (data.status === 'pending') { errEl.textContent = '⏳ Account pending approval.'; errEl.classList.remove('hidden'); return; }

    localStorage.setItem('salonOwner', JSON.stringify(data));
    currentSalon = data;
    afterLogin();
}

function showForgotPass() { document.getElementById('forgot-modal').classList.remove('hidden'); }

async function handleForgotPass() {
    const phone = document.getElementById('fp-phone').value.trim();
    const newpass = document.getElementById('fp-newpass').value.trim();
    if (!phone || !newpass) return toast('Fill all fields', 'red');
    const { data, error } = await sb.from('salons').update({ password: newpass }).eq('phone', phone).select();
    if (error || !data?.length) return toast('Phone not found', 'red');
    toast('Password reset! Please login.');
    document.getElementById('forgot-modal').classList.add('hidden');
}

function afterLogin() {
    hide('login-screen');
    show('main-panel');
    show('navbar');
    document.getElementById('salon-name-display').textContent = currentSalon.name || 'My Salon';
    const onlineToggle = document.getElementById('online-toggle');
    if (onlineToggle) onlineToggle.checked = currentSalon.is_online || false;
    updateStatusLabel(currentSalon.is_online || false);
    switchTab('bookings');

    // Periodic checks
    if (notifInterval) clearInterval(notifInterval);
    notifInterval = setInterval(checkNewBookings, 30000);

    // Block status check
    setInterval(async () => {
        if (!currentSalon) return;
        const { data } = await sb.from('salons').select('status').eq('id', currentSalon.id).single();
        if (data?.status === 'blocked') {
            clearInterval(notifInterval);
            logout(true);
            toast('🚫 Account blocked by admin.', 'red');
        }
    }, 60000);
}

async function toggleOnlineStatus(val) {
    await sb.from('salons').update({ is_online: val }).eq('id', currentSalon.id);
    currentSalon.is_online = val;
    localStorage.setItem('salonOwner', JSON.stringify(currentSalon));
    updateStatusLabel(val);
    toast(val ? '🟢 Salon Online!' : '🔴 Salon Offline');
}

function updateStatusLabel(val) {
    const lbl = document.getElementById('status-label');
    if (lbl) { lbl.textContent = val ? 'Online' : 'Offline'; lbl.style.color = val ? '#34d399' : '#64748b'; }
}

function logout(forced = false) {
    clearInterval(notifInterval);
    localStorage.removeItem('salonOwner');
    currentSalon = null;
    hide('main-panel'); hide('navbar');
    show('login-screen');
    document.getElementById('l-phone').value = '';
    document.getElementById('l-pass').value = '';
}

// ─── NAV ───
function switchTab(tab) {
    document.querySelectorAll('nav button[id^="nav-"]').forEach(b => { b.classList.remove('nav-active'); b.classList.add('text-slate-500'); });
    const btn = document.getElementById('nav-' + tab);
    if (btn) { btn.classList.add('nav-active'); btn.classList.remove('text-slate-500'); }
    if (tab === 'bookings')  renderBookings();
    if (tab === 'slots')     renderSlots();
    if (tab === 'services')  renderServices();
    if (tab === 'earnings')  renderEarnings();
    if (tab === 'settings')  renderSettings();
}

// ─── NOTIFICATIONS ───
async function checkNewBookings() {
    if (!currentSalon) return;
    const { data } = await sb.from('bookings').select('id').eq('salon_id', currentSalon.id).eq('status', 'confirmed');
    const dot = document.getElementById('booking-notif');
    if (data?.length) dot?.classList.remove('hidden');
    else dot?.classList.add('hidden');
}

// ═══════════════════════════════════════════════
// BOOKINGS TAB
// ═══════════════════════════════════════════════
async function renderBookings() {
    const cv = document.getElementById('content-view');
    cv.innerHTML = `<div class="flex justify-center py-10"><div class="spinner-sm"></div></div>`;

    const today = new Date().toISOString().split('T')[0];
    const { data: bookings } = await sb.from('bookings').select('*').eq('salon_id', currentSalon.id).order('created_at', { ascending: false });

    const todayBks = (bookings || []).filter(b => b.booking_date === today);
    const revenue = todayBks.filter(b => b.status === 'confirmed').reduce((s, b) => s + (b.total_amount || 0), 0);
    const pending = (bookings || []).filter(b => b.status === 'pending');
    const commission = _appSettings?.commission_fee || currentSalon.booking_fee || 5;

    cv.innerHTML = `
    <h2 class="text-2xl font-black uppercase italic mb-5">Bookings <span class="text-blue-500">Center</span></h2>

    <div class="grid grid-cols-3 gap-3 mb-5">
        <div class="glass p-4 text-center" style="border-top:2px solid #3b82f6;border-radius:1.2rem;">
            <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Today</p>
            <h2 class="text-2xl font-black">${todayBks.length}</h2>
        </div>
        <div class="glass p-4 text-center" style="border-top:2px solid #10b981;border-radius:1.2rem;">
            <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Revenue</p>
            <h2 class="text-xl font-black text-emerald-400">₹${revenue}</h2>
        </div>
        <div class="glass p-4 text-center" style="border-top:2px solid #f59e0b;border-radius:1.2rem;">
            <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Pending</p>
            <h2 class="text-2xl font-black text-amber-400">${pending.length}</h2>
        </div>
    </div>

    <div class="glass p-4 flex items-center justify-between mb-5" style="border-radius:1.2rem;">
        <div>
            <p class="text-xs font-black text-white uppercase">Auto-Accept</p>
            <p class="text-[9px] text-slate-500 mt-0.5">Admin verify ke baad auto-confirm</p>
        </div>
        <label class="toggle-wrap">
            <input type="checkbox" id="auto-toggle" ${currentSalon.auto_accept?'checked':''} onchange="setAutoAccept(this.checked)">
            <span class="toggle-slider"></span>
        </label>
    </div>

    <div class="flex gap-2 mb-4 overflow-x-auto pb-1">
        <button onclick="filterBk('all')" class="pill pill-blue whitespace-nowrap">All</button>
        <button onclick="filterBk('pending')" class="pill pill-amber whitespace-nowrap">Pending</button>
        <button onclick="filterBk('confirmed')" class="pill pill-green whitespace-nowrap">Confirmed</button>
        <button onclick="filterBk('completed')" class="pill pill-purple whitespace-nowrap">Completed</button>
        <button onclick="filterBk('cancelled')" class="pill pill-red whitespace-nowrap">Cancelled</button>
    </div>

    <div id="bk-list">
        ${(bookings || []).length === 0 ? '<p class="text-center text-slate-600 text-xs py-10 uppercase tracking-widest font-black">Koi booking nahi</p>' :
            (bookings || []).map(b => renderBkCard(b, commission)).join('')}
    </div>`;
    window._allBks = bookings || [];
    window._bkCommission = commission;
}

function renderBkCard(b, commission) {
    const colorMap = { confirmed:'#34d399', cancelled:'#f87171', completed:'#a78bfa', pending:'#fbbf24', pending_admin:'#fbbf24', rejected:'#f87171' };
    const c = colorMap[b.status] || '#64748b';
    const slotTime = b.slot_time ? new Date(b.slot_time) : null;
    const now = new Date();
    const diffHrs = slotTime ? (slotTime - now) / 3600000 : 999;
    const canCancel = (b.status === 'confirmed' || b.status === 'pending') && diffHrs > 2;
    const net = (b.total_amount || 0) - (commission || 5);

    return `
    <div class="booking-card" style="border-left:3px solid ${c};">
        <div class="flex justify-between items-start mb-3">
            <div>
                <p class="font-black text-sm text-white">${b.customer_name || b.customer_phone}</p>
                <p class="text-[10px] text-slate-400 mt-0.5">${b.service_name || 'Service'}</p>
                ${slotTime ? `<p class="text-[9px] text-slate-500 mt-0.5">${slotTime.toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</p>` : ''}
            </div>
            <span class="pill" style="background:${c}22;color:${c};border:1px solid ${c}44;">${b.status}</span>
        </div>
        <div class="flex justify-between items-center">
            <div>
                <p class="text-xl font-black text-white">₹${b.total_amount || 0}</p>
                <p class="text-[9px] text-emerald-400 font-black">Net: ₹${net} (after ₹${commission} fee)</p>
                ${b.booking_code ? `<p class="text-[9px] text-blue-400 font-black mt-0.5">Code: ${b.booking_code}</p>` : ''}
            </div>
            <div class="flex gap-2">
                ${b.status === 'confirmed' ? `<button onclick="openVerifyModal('${b.id}')" class="pill pill-green cursor-pointer">✅ Complete</button>` : ''}
                ${canCancel ? `<button onclick="cancelBk('${b.id}','${b.booking_date}','${b.booking_time||''}')" class="pill pill-red cursor-pointer">Cancel</button>` : ''}
                ${b.status === 'pending' ? `<button onclick="confirmBk('${b.id}')" class="pill pill-blue cursor-pointer">Accept</button>` : ''}
            </div>
        </div>
    </div>`;
}

function filterBk(status) {
    const el = document.getElementById('bk-list');
    if (!el) return;
    const list = status === 'all' ? window._allBks : window._allBks.filter(b => b.status === status);
    el.innerHTML = list.length ? list.map(b => renderBkCard(b, window._bkCommission)).join('') :
        `<p class="text-center text-slate-600 text-xs py-8 uppercase tracking-widest font-black">Koi ${status} booking nahi</p>`;
}

async function confirmBk(id) {

async function verifyAndComplete(bookingId) {
    const code = document.getElementById('verify-inp').value.trim();

    errEl.classList.add('hidden');
    if (!code || code.length !== 5) { errEl.textContent = '❌ 5-digit code daalo!'; errEl.classList.remove('hidden'); return; }
    const { data: bk } = await sb.from('bookings').select('booking_code,status').eq('id', bookingId).single();
    if (!bk) { errEl.textContent = '❌ Booking nahi mili!'; errEl.classList.remove('hidden'); return; }
    if (bk.status === 'completed') { errEl.textContent = '⚠️ Already complete!'; errEl.classList.remove('hidden'); return; }
    if (String(bk.booking_code) !== String(code)) { errEl.textContent = '❌ Galat code!'; errEl.classList.remove('hidden'); return; }
    await sb.from('bookings').update({ status: 'completed' }).eq('id', bookingId);

    toast('✅ Service complete! Booking closed.');
    renderBookings();
}

async function renderSlots() {
    const cv = document.getElementById('content-view');
    const { data: fresh } = await sb.from('salons').select('*').eq('id', currentSalon.id).single();
    if (fresh) { currentSalon = fresh; localStorage.setItem('salonOwner', JSON.stringify(currentSalon)); }

    const openTime = currentSalon.open_time || '09:00';
    const closeTime = currentSalon.close_time || '20:00';
    const dur = currentSalon.slot_duration || 30;
    const allDays = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const slots = genTimeSlots(openTime, closeTime, dur);

    // Get today's booked slots
    const today = new Date().toISOString().split('T')[0];
    const { data: bookedSlots } = await sb.from('bookings').select('slot_time').eq('salon_id', currentSalon.id).eq('booking_date', today).not('status','in','("cancelled","rejected")');
    const bookedSet = new Set((bookedSlots||[]).map(b => {
        if (!b.slot_time) return '';
        return b.slot_time.split('T')[1]?.substring(0,5) || '';
    }));

    cv.innerHTML = `
    <h2 class="text-2xl font-black uppercase italic mb-5">Slot <span class="text-blue-500">Manager</span></h2>

    <!-- Working Days -->
    <div class="glass p-5 mb-4" style="border-radius:1.5rem;">
        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-3">Working Days</p>
        <div class="flex flex-wrap gap-2">
            ${allDays.map(d => `<button onclick="toggleDay('${d}')" id="day-${d}" class="day-pill ${workDays.includes(d)?'on':''}">${d}</button>`).join('')}
        </div>
    </div>

    <!-- Working Hours -->
    <div class="glass p-5 mb-4" style="border-radius:1.5rem;">
        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-3">Working Hours</p>
        <div class="flex gap-3 items-center">
            <div class="flex-1">
                <p class="text-[8px] text-slate-500 mb-1">Open</p>
                <input type="time" id="slot-open" value="${openTime}" class="w-full p-3 rounded-xl text-sm font-black">
            </div>
            <i class="fa-solid fa-arrow-right text-slate-500"></i>
            <div class="flex-1">
                <p class="text-[8px] text-slate-500 mb-1">Close</p>
                <input type="time" id="slot-close" value="${closeTime}" class="w-full p-3 rounded-xl text-sm font-black">
            </div>
        </div>
        <div class="flex items-center gap-3 mt-3">
            <p class="text-[9px] text-slate-400 font-black uppercase flex-shrink-0">Slot Duration</p>
            <select id="slot-dur" class="flex-1 p-2 rounded-xl text-xs font-black">
                ${[15,30,45,60].map(m => `<option value="${m}" ${dur==m?'selected':''}>${m} min</option>`).join('')}
            </select>
        </div>
        <button onclick="saveWorkingHours()" class="w-full mt-4 g-blue text-white py-3 rounded-xl font-black text-[10px] uppercase">
            <i class="fa-solid fa-save mr-2"></i>Save Hours
        </button>
    </div>

    <!-- Today Slots Grid -->
    <div class="glass p-5 mb-4" style="border-radius:1.5rem;">
        <div class="flex justify-between items-center mb-3">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Today's Slots — Block/Unblock</p>
            <div class="flex gap-3 text-[8px]">
                <span class="text-emerald-400 font-black">● Free</span>
                <span class="text-red-400 font-black">● Blocked</span>
                <span class="text-blue-400 font-black">● Booked</span>
            </div>
        </div>
        <div class="grid grid-cols-4 gap-2">
            ${slots.map(t => {
                const isBooked = bookedSet.has(t);
                const blocked = Array.isArray(currentSalon.blocked_slots) ? currentSalon.blocked_slots : [];
                const isBlocked = blocked.includes(t);
                const cls = isBooked ? 'slot-booked' : isBlocked ? 'slot-blocked' : 'slot-free';
                return `<div onclick="${isBooked ? '' : `toggleSlotBlock('${t}')`}" class="slot-cell ${cls}" id="slot-${t.replace(':','-')}">${t}${isBooked?'<br><span style="font-size:7px">Booked</span>':''}</div>`;
            }).join('')}
        </div>
        ${slots.length === 0 ? '<p class="text-[10px] text-slate-600 text-center py-4">Working hours set karein pehle</p>' : ''}
    </div>`;
}

function genTimeSlots(open, close, dur) {
    const slots = [];
    let [h, m] = open.split(':').map(Number);
    const [ch, cm] = close.split(':').map(Number);
    const end = ch * 60 + cm;
    while (h * 60 + m < end) {
        slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
        m += dur; if (m >= 60) { h += Math.floor(m/60); m = m % 60; }
    }
    return slots;
}

function toggleDay(d) {
    let days = currentSalon.working_days || ['Mon','Tue','Wed','Thu','Fri','Sat'];
    if (days.includes(d)) days = days.filter(x => x !== d); else days.push(d);
    currentSalon.working_days = days;
    document.getElementById('day-' + d)?.classList.toggle('on', days.includes(d));
    sb.from('salons').update({ working_days: days }).eq('id', currentSalon.id);
    localStorage.setItem('salonOwner', JSON.stringify(currentSalon));
}

async function saveWorkingHours() {
    const open = document.getElementById('slot-open').value;
    const close = document.getElementById('slot-close').value;
    const dur = parseInt(document.getElementById('slot-dur').value);
    await sb.from('salons').update({ open_time: open, close_time: close, slot_duration: dur }).eq('id', currentSalon.id);
    currentSalon.open_time = open; currentSalon.close_time = close; currentSalon.slot_duration = dur;
    localStorage.setItem('salonOwner', JSON.stringify(currentSalon));
    toast('✅ Working hours saved!');
    renderSlots();
}

async function toggleSlotBlock(time) {
    let blocked = Array.isArray(currentSalon.blocked_slots) ? [...currentSalon.blocked_slots] : [];
    if (blocked.includes(time)) blocked = blocked.filter(t => t !== time); else blocked.push(time);
    currentSalon.blocked_slots = blocked;
    await sb.from('salons').update({ blocked_slots: blocked }).eq('id', currentSalon.id);
    localStorage.setItem('salonOwner', JSON.stringify(currentSalon));
    const el = document.getElementById('slot-' + time.replace(':','-'));
    if (el) el.className = `slot-cell ${blocked.includes(time) ? 'slot-blocked' : 'slot-free'}`;
}

                <i class="fa-solid fa-key mr-2"></i>Update
            </button>
        </div>
    </div>

    <!-- Logout -->
    <button onclick="logout()" class="w-full py-4 rounded-2xl font-black text-sm" style="background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.2);">
        <i class="fa-solid fa-power-off mr-2"></i>Logout
    </button>`;
}

async function getMyLocation() {
    if (!navigator.geolocation) return toast('GPS unavailable', 'red');
    toast('Location detect ho rahi hai...', 'amber');
    navigator.geolocation.getCurrentPosition(pos => {
        document.getElementById('set-lat').value = pos.coords.latitude.toFixed(7);
        document.getElementById('set-lon').value = pos.coords.longitude.toFixed(7);
        toast('📍 Location captured!');
    }, () => toast('Location permission denied', 'red'));
}

async function saveLocation() {
    const lat = parseFloat(document.getElementById('set-lat').value);
    const lon = parseFloat(document.getElementById('set-lon').value);
    if (isNaN(lat) || isNaN(lon)) return toast('Valid lat/lon enter karein', 'red');
    await sb.from('salons').update({ latitude: lat, longitude: lon }).eq('id', currentSalon.id);
    currentSalon.latitude = lat; currentSalon.longitude = lon;
    localStorage.setItem('salonOwner', JSON.stringify(currentSalon));
    toast('✅ Location saved!');
}

async function saveLocationDetails() {
    const updates = {
        city: document.getElementById('set-city').value.trim(),
        state: document.getElementById('set-state').value.trim(),
        area: document.getElementById('set-area').value.trim(),
        pincode: document.getElementById('set-pin').value.trim(),
    };
    await sb.from('salons').update(updates).eq('id', currentSalon.id);
    Object.assign(currentSalon, updates);
    localStorage.setItem('salonOwner', JSON.stringify(currentSalon));
    toast('✅ Location details saved!');
}

async function saveProfile() {
    const updates = {
        name: document.getElementById('set-name').value.trim(),
        owner_name: document.getElementById('set-owner').value.trim(),
        phone: document.getElementById('set-phone').value.trim(),
        address: document.getElementById('set-addr').value.trim(),
    };
    const { error } = await sb.from('salons').update(updates).eq('id', currentSalon.id);
    if (!error) {
        Object.assign(currentSalon, updates);
        localStorage.setItem('salonOwner', JSON.stringify(currentSalon));
        document.getElementById('salon-name-display').textContent = updates.name || currentSalon.name;
        toast('✅ Profile updated!');
    } else toast('Error: ' + error.message, 'red');
}

async function updatePassword() {
    const oldP = document.getElementById('old-p').value;
    const newP = document.getElementById('new-p').value;
    if (oldP !== currentSalon.password) return toast('❌ Purana password galat!', 'red');
    if (newP.length < 4) return toast('Minimum 4 characters chahiye!', 'red');
    const { error } = await sb.from('salons').update({ password: newP }).eq('id', currentSalon.id);
    if (!error) { toast('✅ Password updated!'); currentSalon.password = newP; localStorage.setItem('salonOwner', JSON.stringify(currentSalon)); }
    else toast('Error: ' + error.message, 'red');
}
</script>
</body>
