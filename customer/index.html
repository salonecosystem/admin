function getUserLocation() {
    const lat = parseFloat(localStorage.getItem('userLat'));
    const lon = parseFloat(localStorage.getItem('userLon'));
    if (lat && lon && !isNaN(lat) && !isNaN(lon)) return Promise.resolve({ lat, lon });
    return new Promise(resolve => {
        if (!navigator.geolocation) return resolve(null);
        navigator.geolocation.getCurrentPosition(
            p => {
                localStorage.setItem('userLat', p.coords.latitude);
                localStorage.setItem('userLon', p.coords.longitude);
                resolve({ lat: p.coords.latitude, lon: p.coords.longitude });
            },
            () => resolve(null),
            { timeout: 8000, enableHighAccuracy: true }
        );
    });
}

async function getCityFromCoords(lat, lon) {
    try {
        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
        const d = await r.json();
        return d?.address?.city || d?.address?.town || d?.address?.village || d?.address?.county || '';
    } catch { return ''; }
}

function haversine(lat1, lon1, lat2, lon2) {
    const toR = d => d * Math.PI / 180;
    const R = 6371;
    const dLat = toR(lat2 - lat1), dLon = toR(lon2 - lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toR(lat1)) * Math.cos(toR(lat2)) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtDist(km) {
    if (km === null || km === undefined) return '';
    if (km < 1) return Math.round(km * 1000) + ' m';
    return km.toFixed(1) + ' km';
}

function isOpenNow(salon) {
    const now = new Date();
    const day = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][now.getDay()];
    const days = salon.working_days || [];
    if (!days.includes(day)) return false;
    const cur = now.getHours() * 60 + now.getMinutes();
    const [oh, om] = (salon.open_time || '09:00').split(':').map(Number);
    const [ch, cm] = (salon.close_time || '20:00').split(':').map(Number);
    return cur >= oh * 60 + om && cur <= ch * 60 + cm;
}

let _activeGenderF = 'all';
let _activeTypeF = 'all';

function setGenderF(val) {
    _activeGenderF = _activeGenderF === val ? 'all' : val;
    document.querySelectorAll('#gf-male,#gf-female').forEach(b => b.classList.remove('active-g'));
    if (_activeGenderF !== 'all') document.getElementById('gf-' + val.toLowerCase())?.classList.add('active-g');
    applyFilters();
}

function setTypeF(val) {
    _activeTypeF = _activeTypeF === val ? 'all' : val;
    document.querySelectorAll('#tf-ac,#tf-luxury').forEach(b => b.classList.remove('active-g','active-gold'));
    if (_activeTypeF !== 'all') {
        const id = 'tf-' + val.toLowerCase();
        const btn = document.getElementById(id);
        if (btn) btn.classList.add(val === 'Luxury' ? 'active-gold' : 'active-g');
    }
    applyFilters();
}

function toggleOpenNow() {
    _openNowOnly = !_openNowOnly;
    const btn = document.getElementById('f-open');
    if (btn) btn.classList.toggle('active-b', _openNowOnly);
    applyFilters();
}

function setRadius(r) {
    _activeRadius = r;
    document.querySelectorAll('[id^="rad-"]').forEach(b => b.classList.remove('active-g'));
    document.getElementById('rad-' + r)?.classList.add('active-g');
    applyFilters();
}

function setCat(val, btn) {
    _activeCat = val;
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
}

function onSearch(val) {
    _searchQuery = val.toLowerCase().trim();
    applyFilters();
}

async function loadHomeData() {
    const userLoc = await getUserLocation();

    // Update city label
    if (userLoc) {
        const city = await getCityFromCoords(userLoc.lat, userLoc.lon);
        const lbl = document.getElementById('city-label');
        if (lbl) lbl.textContent = city || 'Current Location';
    } else {
        const lbl = document.getElementById('city-label');
        if (lbl) lbl.textContent = 'Location unavailable';
    }

    // Load salons from Supabase
    const { data: salons, error } = await sb.from('salons').select('*').eq('status','approved');
    if (error) {
        document.getElementById('salon-list').innerHTML = `<p style="text-align:center;padding:40px 0;color:#f87171;font-size:11px;font-weight:800;text-transform:uppercase;">Database Error</p>`;
        return;
    }

    // Calculate distances
    _salonsCache = (salons || []).map(s => {
        const dist = (userLoc && s.latitude && s.longitude)
            ? haversine(userLoc.lat, userLoc.lon, parseFloat(s.latitude), parseFloat(s.longitude))
            : null;
        return { ...s, _dist: dist };
    });

    // Sort by distance
    _salonsCache.sort((a, b) => {
        if (a._dist === null) return 1;
        if (b._dist === null) return -1;
        return a._dist - b._dist;
    });

    applyFilters();
}

function applyFilters() {
    let list = [..._salonsCache];
    const userLat = parseFloat(localStorage.getItem('userLat'));
    const userLon = parseFloat(localStorage.getItem('userLon'));

    // Radius filter
    if (userLat && userLon) {
        list = list.filter(s => s._dist === null || s._dist <= _activeRadius);
    }

    // Search filter
    if (_searchQuery) {
        list = list.filter(s =>
            (s.name||'').toLowerCase().includes(_searchQuery) ||
            (s.city||'').toLowerCase().includes(_searchQuery) ||
            (s.area||'').toLowerCase().includes(_searchQuery) ||
            (s.pincode||'').includes(_searchQuery) ||
            (s.address||'').toLowerCase().includes(_searchQuery)
        );
    }

    // Category
    if (_activeCat !== 'all') {
        if (_activeCat === 'Ladies') list = list.filter(s => s.category === 'Beauty Parlour');
        else if (_activeCat === 'Gents') list = list.filter(s => s.category === 'Salon');
    }

    // Gender filter
    if (_activeGenderF === 'Male') list = list.filter(s => s.category === 'Salon');
    if (_activeGenderF === 'Female') list = list.filter(s => s.category === 'Beauty Parlour');

    // Type filter
    if (_activeTypeF !== 'all') list = list.filter(s => s.salon_type === _activeTypeF);

    // Open Now
    if (_openNowOnly) list = list.filter(s => isOpenNow(s));

    renderSalonList(list);
}

function toggleService(id, name, price, duration) {
    const idx = cart.findIndex(i => i.id === id);
    const checkEl = document.getElementById('svc-check-' + id);
    const itemEl = document.getElementById('svc-' + id);
    if (idx === -1) {
        cart.push({ id, name, price, duration });
        if (itemEl) itemEl.classList.add('selected');
        if (checkEl) { checkEl.style.background = 'var(--gl)'; checkEl.style.borderColor = 'var(--gl)'; checkEl.innerHTML = '✓'; }
    } else {
        cart.splice(idx, 1);
        if (itemEl) itemEl.classList.remove('selected');
        if (checkEl) { checkEl.style.background = ''; checkEl.style.borderColor = 'rgba(45,122,80,0.3)'; checkEl.innerHTML = ''; }
    }
    updateCartUI();
}

function updateCartUI() {
    const fee = _appSettings?.commission_fee || 5;
    const total = cart.reduce((s, i) => s + i.price, 0);
    const summary = document.getElementById('cart-summary');
    const itemsEl = document.getElementById('cart-items');
    const totalEl = document.getElementById('cart-total');
    if (!summary) return;
    if (cart.length === 0) { summary.style.display = 'none'; return; }
    summary.style.display = 'block';
    if (itemsEl) itemsEl.innerHTML = cart.map(i =>
        `<div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="font-size:11px;color:white;font-weight:700;">${i.name}</span><span style="font-size:12px;font-weight:800;color:var(--gl);">₹${i.price}</span></div>`
    ).join('');
    if (totalEl) totalEl.textContent = '₹' + (total + fee);
}

async function loadSlots(salonId) {
    const dateVal = document.getElementById('book-date')?.value;
    if (!dateVal) return;
    const wrap = document.getElementById('slots-wrap');
    if (!wrap) return;
    wrap.innerHTML = `<p style="color:var(--muted);font-size:11px;font-weight:700;padding:8px 0;">Loading slots...</p>`;

    const { data: salon } = await sb.from('salons').select('open_time,close_time,slot_duration,working_days').eq('id', salonId).single();
    const { data: bookedSlots } = await sb.from('bookings').select('slot_time').eq('salon_id', salonId).eq('booking_date', dateVal).not('status','in','("cancelled","rejected")');
    const { data: blocked } = await sb.from('blocked_slots').select('slot_time').eq('salon_id', salonId).like('slot_time', dateVal + '%');

    const openH = parseInt((salon?.open_time||'09:00').split(':')[0]);
    const closeH = parseInt((salon?.close_time||'20:00').split(':')[0]);
    const dur = salon?.slot_duration || 30;

    const takenTimes = new Set([
        ...(bookedSlots||[]).map(b => b.slot_time),
        ...(blocked||[]).map(b => b.slot_time)
    ]);

    const slots = [];
    for (let h = openH; h < closeH; h++) {
        for (let m = 0; m < 60; m += dur) {
            const hh = String(h).padStart(2,'0');
            const mm = String(m).padStart(2,'0');
            const isoSlot = `${dateVal}T${hh}:${mm}:00`;
            const taken = takenTimes.has(isoSlot);
            slots.push({ time: `${hh}:${mm}`, iso: isoSlot, taken });
        }
    }

    wrap.innerHTML = slots.length === 0 ? `<p style="color:var(--muted);font-size:11px;font-weight:700;padding:8px 0;">Aaj koi slot nahi</p>` :
    `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;">
        ${slots.map(sl => `
        <div class="slot-box ${sl.taken?'slot-taken':'slot-free'}" id="slot-${sl.iso.replace(/[:.]/g,'-')}"
            onclick="${sl.taken?'':'selectSlot(\''+sl.iso+'\')'}">
            ${sl.time}${sl.taken?'<br><span style="font-size:7px;">Taken</span>':''}
        </div>`).join('')}
    </div>`;
}

function selectSlot(iso) {
    // Deselect previous
    document.querySelectorAll('.slot-selected').forEach(el => {
        el.classList.remove('slot-selected');
        el.classList.add('slot-free');
    });
    selectedSlot = iso;
    const id = 'slot-' + iso.replace(/[:.]/g, '-');
    const el = document.getElementById(id);
    if (el) { el.classList.remove('slot-free'); el.classList.add('slot-selected'); }
}

function proceedPayment(salonId, salonName, fee) {
    if (cart.length === 0) return showToast('Koi service select nahi ki', 'red');
    if (!document.getElementById('book-date')?.value) return showToast('Date select karein', 'red');
    if (!selectedSlot) return showToast('Ek slot select karein', 'red');
    const total = cart.reduce((s, i) => s + i.price, 0) + fee;
    renderPaymentPage(salonId, salonName, total, selectedSlot, fee);
}

function renderPaymentPage(salonId, salonName, total, slot, fee) {

    el.innerHTML = `
    <div style="padding:28px 20px 120px;text-align:center;">
        <button onclick="openBooking('${salonId}')" style="float:left;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;margin-bottom:20px;">← Back</button>
        <h2 style="font-family:'Poppins',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px;clear:both;">Secure <span style="color:var(--gl);">Payment</span></h2>
        <p style="color:var(--muted);font-size:11px;margin-bottom:24px;">UPI se payment karein</p>

        <div class="glass" style="padding:24px;margin-bottom:20px;">

            <div style="background:white;padding:12px;border-radius:1.2rem;display:inline-block;margin-bottom:16px;">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=${encodeURIComponent(upiId)}&am=${total}&tn=SalonBooking" style="width:160px;height:160px;">
            </div>
            <p style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:16px;">UPI ID: <span style="color:var(--gl);font-weight:900;">${upiId}</span></p>
            <div>
                <p style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Total Amount</p>
                <h3 style="font-size:40px;font-weight:900;color:white;font-family:'Poppins',sans-serif;">₹${total}</h3>
                <p style="font-size:9px;color:var(--muted);margin-top:4px;">(Services + ₹${fee} platform fee)</p>
            </div>
        </div>

        <div style="text-align:left;">
            <p style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;">UTR / Transaction ID</p>
            <input type="text" id="utr-id" placeholder="12-DIGIT UTR NUMBER" class="inp" style="margin-bottom:14px;font-weight:900;letter-spacing:.1em;">
            <p style="font-size:10px;color:var(--muted);margin-bottom:16px;">⚠️ Payment ke baad UTR number enter karein. Admin verify karega.</p>
            <button onclick="processFinalBooking('${salonId}','${salonName.replace(/'/g,"\\'")}',${total},'${slot}',${fee})" class="btn-g" style="width:100%;padding:18px;font-size:14px;margin-bottom:10px;">✅ Verify & Confirm</button>
            <button onclick="renderHome()" style="width:100%;padding:14px;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;background:none;border:none;cursor:pointer;">Cancel</button>
        </div>
    </div>`;
}

function genCode() { return String(Math.floor(10000 + Math.random() * 90000)); }

async function processFinalBooking(sid, sname, total, slot, fee) {
    const utr = document.getElementById('utr-id')?.value.trim();
    if (!utr || utr.length < 6) return showToast('Valid UTR enter karein', 'red');

    const slotDate = slot.split('T')[0];
    const slotTime = slot.split('T')[1];
    const serviceNames = cart.map(i => i.name).join(', ');
    const code = genCode();

    const { data: inserted, error } = await sb.from('bookings').insert([{
        booking_code: code,
        customer_phone: currentUser.phone,
        customer_name: currentUser.name || currentUser.phone,
        customer_id: currentUser.id,
        salon_id: sid, salon_name: sname,
        service_name: serviceNames, services: JSON.stringify(cart),
        price: total, total_amount: total, commission_fee: fee,
        booking_date: slotDate, booking_time: slotTime, slot_time: slot,
        utr_id: utr, payment_method: 'upi', status: 'pending_admin'
    }]).select();

    if (error) return showToast('Booking error: ' + error.message, 'red');

    const { data: salonData } = await sb.from('salons').select('phone,latitude,longitude,address').eq('id', sid).single();
    renderSuccess(sname, code, salonData, inserted?.[0]?.id);
}

function renderSuccess(sname, code, salonData, bookingId) {
    if (_bookingPollTimer) clearInterval(_bookingPollTimer);
    const mapUrl = salonData?.latitude && salonData?.longitude
        ? `https://www.google.com/maps/dir/?api=1&destination=${salonData.latitude},${salonData.longitude}` : null;
    const salonPhone = salonData?.phone ? String(salonData.phone).replace(/\D/g,'') : null;

    function buildPage(confirmed) { return `
    <div style="padding:32px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;min-height:100vh;">
        <div style="width:72px;height:72px;${confirmed?'background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.4);':'background:rgba(234,179,8,0.12);color:#E8B84B;border:1px solid rgba(234,179,8,0.3);'}border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px;">
            <i class="fas ${confirmed?'fa-check-double':'fa-clock'}"></i>
        </div>
        <h2 style="font-family:'Poppins',sans-serif;font-size:26px;font-weight:800;margin-bottom:6px;">
            ${confirmed?'Booking <span style="color:#34d399;">Confirmed!</span>':'Booking <span style="color:#E8B84B;">Submitted!</span>'}
        </h2>
        <p style="color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:20px;">
            ${confirmed?'Admin ne verify kar diya ✅':'Payment received — Admin verify karega'}
        </p>
        <div style="width:100%;padding:14px 16px;border-radius:1rem;margin-bottom:20px;${confirmed?'background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.25);':'background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.25);'}">
            ${confirmed?
                `<p style="color:#34d399;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;">✅ Verified!</p>
                 <p style="color:var(--muted);font-size:10px;margin-top:4px;">Booking code lekar salon jaiye</p>`:
                `<p style="color:#E8B84B;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;">⏳ Verification Pending</p>
                 <p style="color:var(--muted);font-size:10px;margin-top:4px;">UTR admin verify kar raha hai... <span id="poll-dots">.</span></p>`
            }
        </div>
        <div class="glass" style="width:100%;padding:24px;margin-bottom:16px;border-color:rgba(45,122,80,0.35);">
            <p style="font-size:10px;font-weight:800;color:var(--gl);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;">🎟️ Booking Code</p>
            <div style="font-size:52px;font-weight:900;color:white;letter-spacing:.3em;font-family:monospace;margin-bottom:8px;">${code}</div>
            <p style="font-size:10px;color:var(--muted);font-weight:700;">Salon jaate waqt yeh code dikhayein</p>
        </div>
        ${confirmed && (mapUrl || salonPhone) ? `
        <div class="glass" style="width:100%;padding:18px;text-align:left;margin-bottom:16px;">
            <p style="font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;">${sname}</p>
            <div style="display:flex;gap:10px;">
                ${salonPhone?`<a href="tel:${salonPhone}" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:#34d399;padding:12px;border-radius:12px;text-decoration:none;font-size:10px;font-weight:800;text-transform:uppercase;"><i class="fas fa-phone"></i> Call</a>`:''}
                ${mapUrl?`<a href="${mapUrl}" target="_blank" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(45,122,80,0.12);border:1px solid rgba(45,122,80,0.3);color:var(--gl);padding:12px;border-radius:12px;text-decoration:none;font-size:10px;font-weight:800;text-transform:uppercase;"><i class="fas fa-map-location-dot"></i> Directions</a>`:''}
            </div>
        </div>` : ''}
        <button onclick="renderHome()" class="btn-g" style="width:100%;padding:18px;font-size:14px;">Go to Dashboard</button>
    </div>`; }

    document.getElementById('app').innerHTML = buildPage(false);

    let dots = 0;
    const dotsTimer = setInterval(() => {
        const el = document.getElementById('poll-dots');
        if (!el) { clearInterval(dotsTimer); return; }
        dots = (dots + 1) % 4;
        el.textContent = '.'.repeat(dots + 1);
    }, 600);

    if (bookingId) {
        _bookingPollTimer = setInterval(async () => {
            const { data } = await sb.from('bookings').select('status').eq('id', bookingId).single();
            if (data?.status === 'confirmed') {
                clearInterval(_bookingPollTimer); clearInterval(dotsTimer);
                document.getElementById('app').innerHTML = buildPage(true);
            } else if (data?.status === 'rejected' || data?.status === 'cancelled') {
                clearInterval(_bookingPollTimer); clearInterval(dotsTimer);
                document.getElementById('app').innerHTML = `
                <div style="padding:40px 20px;text-align:center;">
                    <div style="font-size:60px;margin-bottom:16px;">❌</div>
                    <h2 style="font-family:'Poppins',sans-serif;font-size:24px;font-weight:800;margin-bottom:8px;color:#f87171;">Booking Rejected</h2>
                    <p style="color:var(--muted);font-size:12px;margin-bottom:32px;">UTR verify nahi ho saka.</p>
                    <button onclick="renderHome()" class="btn-g" style="width:100%;padding:18px;font-size:14px;">Go Back</button>
                </div>`;
            }
        }, 8000);
    }
}

// ═══════════════════════════════════════════════════════════
// BOOKINGS HISTORY (with 2-hour cancel rule)
// ═══════════════════════════════════════════════════════════
async function renderBookings() {
    document.getElementById('app').innerHTML = `
    <div style="padding:20px 16px 120px;">
        <h2 style="font-family:'Poppins',sans-serif;font-size:22px;font-weight:800;margin-bottom:20px;">My <span style="color:var(--gl);">Bookings</span></h2>
        <div id="bk-list"><div style="display:flex;justify-content:center;padding:40px;"><div style="width:36px;height:36px;border:3px solid var(--gm);border-top-color:var(--gl);border-radius:50%;animation:spin .7s linear infinite;"></div></div></div>
    </div>
    ${NAV('bookings')}`;

    const { data: bookings } = await sb.from('bookings')
        .select('*').eq('customer_phone', currentUser.phone)
        .order('created_at', { ascending: false });

    const el = document.getElementById('bk-list');
    if (!el) return;

    if (!bookings || bookings.length === 0) {
        el.innerHTML = `<p style="text-align:center;padding:60px 0;color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.15em;">Koi booking nahi</p>`;
        return;
    }

    el.innerHTML = bookings.map(b => {
        const slotTime = b.slot_time ? new Date(b.slot_time) : null;
        const now = new Date();
        const cancelWindow = _appSettings?.cancel_window_hours || 2;
        const canCancel = slotTime && (slotTime - now) > (cancelWindow * 60 * 60 * 1000) && (b.status === 'pending' || b.status === 'pending_admin');
        const hoursLeft = slotTime ? ((slotTime - now) / 3600000).toFixed(1) : null;
        const colorMap = { confirmed:'#34d399', cancelled:'#f87171', completed:'#60a5fa', pending:'#E8B84B', pending_admin:'#E8B84B', rejected:'#f87171' };
        const color = colorMap[b.status] || '#E8B84B';

        return `
        <div class="glass2" style="padding:18px;margin-bottom:12px;border-left:4px solid ${color};">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
                <div>
                    <h4 style="font-weight:800;color:white;font-size:13px;font-family:'Poppins',sans-serif;">${b.salon_name||'Salon'}</h4>
                    <p style="font-size:10px;font-weight:700;color:var(--muted);margin-top:2px;">${b.service_name||''}</p>
                    ${slotTime ? `<p style="font-size:10px;color:var(--muted);margin-top:2px;">${slotTime.toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</p>` : ''}
                </div>
                <span style="font-size:8px;font-weight:800;padding:4px 10px;background:rgba(255,255,255,0.04);border-radius:20px;text-transform:uppercase;letter-spacing:.08em;color:${color};">${b.status}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:flex-end;">
                <div>
                    <p style="font-size:24px;font-weight:900;color:white;font-family:'Poppins',sans-serif;">₹${b.total_amount||0}</p>
                    ${b.booking_code ? `<p style="font-size:10px;font-weight:800;color:var(--gl);margin-top:2px;letter-spacing:.05em;">Code: <span style="font-family:monospace;font-size:13px;">${b.booking_code}</span></p>` : ''}
                </div>
                <div style="text-align:right;">
                    ${canCancel ? `
                    <button onclick="cancelBooking('${b.id}')" style="color:#f87171;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;border:1px solid rgba(248,113,113,0.25);padding:8px 14px;border-radius:10px;background:rgba(248,113,113,0.06);cursor:pointer;">Cancel</button>
                    <p style="font-size:8px;color:var(--muted);margin-top:4px;">${hoursLeft}h baki hai</p>` : ''}
                    ${b.status === 'pending' && !canCancel && slotTime && slotTime > now ? `<p style="font-size:8px;color:#f87171;font-weight:700;">Cancel allowed nahi<br>(2h se kam baki)</p>` : ''}
                    ${b.status === 'completed' ? `<span style="font-size:9px;font-weight:800;color:#34d399;text-transform:uppercase;padding:8px 14px;border-radius:10px;background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.25);">✅ Done</span>` : ''}
                </div>
            </div>
        </div>`;
    }).join('');
}

async function cancelBooking(id) {
    if (!confirm('Booking cancel karein?')) return;
    // Re-check 2 hour rule
    const { data: bk } = await sb.from('bookings').select('slot_time,status').eq('id', id).single();
    if (!bk) return showToast('Booking not found', 'red');
    const cancelWindow = _appSettings?.cancel_window_hours || 2;
    const slotTime = new Date(bk.slot_time);
    const now = new Date();
    if ((slotTime - now) <= (cancelWindow * 60 * 60 * 1000)) {
        return showToast(`Cancel allowed nahi — slot ke ${cancelWindow} ghante pehle karein`, 'red');
    }
    await sb.from('bookings').update({ status:'cancelled', cancelled_at: new Date().toISOString(), cancel_reason:'Customer cancelled' }).eq('id', id);
    showToast('Booking cancel ho gayi');
    renderBookings();
}

}

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
async function openWhatsApp() {
    const num = _appSettings?.support_whatsapp || '';
    if (!num) return showToast('Support number available nahi');
    const clean = String(num).replace(/\D/g,'');
    const msg = encodeURIComponent(`Namaste! Mera naam ${currentUser?.name||''} hai. (Phone: ${currentUser?.phone||''})\n\nProblem: `);
    window.open(`https://wa.me/${clean.startsWith('91')?clean:'91'+clean}?text=${msg}`, '_blank');
}

function referFriend() {
    const text = `Hey! Salon Partner app use karo — premium salons book karo ek tap mein!`;
    if (navigator.share) navigator.share({ title:'Salon Partner', text, url: window.location.href });
    else { navigator.clipboard?.writeText(window.location.href); showToast('Link copied!'); }
}

let _toastTimer;
function showToast(msg, type = 'green') {
    let t = document.getElementById('toast');
    if (!t) { t = document.createElement('div'); t.id = 'toast'; t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:14px;font-size:12px;font-weight:800;max-width:90vw;text-align:center;transition:opacity .3s;font-family:Nunito,sans-serif;'; document.body.appendChild(t); }
    t.textContent = msg;
    t.style.background = type === 'red' ? 'rgba(239,68,68,0.9)' : 'rgba(16,185,129,0.9)';
    t.style.color = 'white';
    t.style.opacity = '1';
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

// CSS animation for spinner
const style = document.createElement('style');
style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(style);

// Start app
init();
</script>
